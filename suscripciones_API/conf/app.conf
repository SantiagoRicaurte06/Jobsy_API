# Variables de API
# _HTTP_PORT = [Puerto de expocion del api]
# _RUNMODE = [Modo de ejecucion del API: dev, prod, test]

# Variables de BD 
# _PGUSER = [Usuario de BD]
# _PGPASSWORD = [Password de BD]
# _PGHOST = [IP, URL, DOMINIO o ENDPOINT de BD]
# _PGPORT = [Puerto de la BD]
# _PGDATABASE = [Nombre de la BD]
# _PGSCHEMA = [Esquema de la BD]

appname         = Crud_suscripciones
httpport        = ${CRUD_SUSCRIPCIONES_HTTP_PORT}
runmode         = ${CRUD_SUSCRIPCIONES_RUNMODE}
autorender      = false
copyrequestbody = true
EnableDocs      = true

#Definicion de variables de entorno DB
PGuser      = ${CRUD_SUSCRIPCIONES_PGUSER}
PGpassword  = ${CRUD_SUSCRIPCIONES_PGPASSWORD}
PGhost      = ${CRUD_SUSCRIPCIONES_PGHOST}
PGport      = ${CRUD_SUSCRIPCIONES_PGPORT}
PGdatabase  = ${CRUD_SUSCRIPCIONES_PGDATABASE}
PGschema    = ${CRUD_SUSCRIPCIONES_PGSCHEMA}

