appname = Catalogo_api
httpport = 8080
runmode = dev
autorender = false
copyrequestbody = true
EnableDocs = true
sqlconn = postgres://postgres:postgres@127.0.0.1:5432/jobsy_api?sslmode=disable




# =========================================================
# VARIABLES DE LA BASE DE DATOS
# =========================================================
# _PGUSER     = Usuario de PostgreSQL
# _PGPASS     = Contraseña del usuario
# _PGHOST     = Host, IP o dominio de PostgreSQL
# _PGPORT     = Puerto de PostgreSQL
# _PGDATABASE = Nombre de la base de datos
# _PGSCHEMA   = Nombre del esquema de la base de datos

appname = catalogo_api
httpport = ${CATALOGO_API_HTTP_PORT}
runmode = ${CATALOGO_API_RUN_MODE}

autorender = false
copyrequestbody = true
EnableDocs = true

# =========================================================
# VARIABLES DE CONEXION A POSTGRESQL
# =========================================================

PGuser = ${CATALOGO_API_PGUSER}
PGpass = ${CATALOGO_API_PGPASS}
PGhost = ${CATALOGO_API_PGHOST}
PGport = ${CATALOGO_API_PGPORT}
PGdatabase = ${CATALOGO_API_PGDATABASE}
PGschema = ${CATALOGO_API_PGSCHEMA}

# =========================================================
# VARIABLES DE ENTORNO PARA EJECUTAR EL API
# =========================================================

